<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Web Service</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f6f8fa;
        }
        .container {
            display: flex;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }
        .editor-pane, .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #24292e;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
        }
        textarea {
            flex: 1;
            border: none;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            resize: none;
            outline: none;
            background-color: #fafafa;
        }
        #preview {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            line-height: 1.6;
        }
        /* Basic Markdown Styles for the Preview */
        #preview h1, #preview h2, #preview h3 { margin-bottom: 10px; border-bottom: 1px solid #eaecef; padding-bottom: 5px; }
        #preview p { margin-bottom: 15px; }
        #preview code { background-color: #f6f8fa; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
        #preview pre { background-color: #f6f8fa; padding: 10px; border-radius: 5px; overflow-x: auto; margin-bottom: 15px; }
        #preview blockquote { border-left: 4px solid #dfe2e5; color: #6a737d; padding-left: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="editor-pane">
            <div class="header">Markdown Input</div>
            <textarea id="editor" placeholder="Type your markdown here..."></textarea>
        </div>

        <div class="preview-pane">
            <div class="header">Live Preview</div>
            <div id="preview"></div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        // Function to update the preview
        function updatePreview() {
            const markdownText = editor.value;
            // Use marked.parse to convert Markdown to HTML
            preview.innerHTML = marked.parse(markdownText);
        }

        // Listen for user typing
        editor.addEventListener('input', updatePreview);

        // Set some default text on load
        editor.value = "# Hello World!\n\nWelcome to your new **Markdown Web Service**.\n\n- Try typing on the left.\n- See the preview on the right.";
        updatePreview();
    </script>
</body>
</html>
