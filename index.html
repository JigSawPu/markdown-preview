<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini-Style Markdown Previewer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f0f4f8;
            color: #1f2937;
        }
        .container {
            display: flex;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }
        .editor-pane, .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .header {
            background-color: #f9fafb;
            color: #374151;
            padding: 12px 20px;
            font-weight: 600;
            border-bottom: 1px solid #e5e7eb;
            letter-spacing: 0.5px;
        }
        textarea {
            flex: 1;
            border: none;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            resize: none;
            outline: none;
            background-color: #ffffff;
            color: #374151;
        }
        #preview {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            line-height: 1.7;
            font-size: 16px;
        }
        
        /* Typography Styling */
        #preview h1, #preview h2, #preview h3 { margin-top: 20px; margin-bottom: 12px; font-weight: 600; color: #111827; }
        #preview p { margin-bottom: 16px; }
        #preview ul, #preview ol { margin-bottom: 16px; padding-left: 24px; }
        #preview a { color: #2563eb; text-decoration: none; }
        #preview a:hover { text-decoration: underline; }
        #preview blockquote { border-left: 4px solid #e5e7eb; color: #4b5563; padding-left: 16px; margin-bottom: 16px; font-style: italic; }
        
        /* Inline Code */
        #preview code:not(.hljs) {
            background-color: #f1f5f9;
            color: #ef4444;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        /* Code Block Wrapper */
        .code-block-wrapper {
            position: relative;
            margin-bottom: 16px;
            border-radius: 8px;
            background-color: #0d1117; /* GitHub Dark Background */
            overflow: hidden;
        }
        
        /* Copy Button */
        .copy-button {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #c9d1d9;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .copy-button:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* The actual pre and code elements */
        #preview pre {
            margin: 0;
            padding: 40px 16px 16px 16px; /* Extra top padding for the button */
            overflow-x: auto;
        }
        #preview pre code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="editor-pane">
            <div class="header">Markdown Input</div>
            <textarea id="editor" placeholder="Type your markdown here..."></textarea>
        </div>

        <div class="preview-pane">
            <div class="header">Live Preview</div>
            <div id="preview"></div>
        </div>
    </div>

    <script>
        // Configure marked.js to use highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        function updatePreview() {
            const markdownText = editor.value;
            // Parse Markdown to HTML
            preview.innerHTML = marked.parse(markdownText);

            // Add copy buttons to all code blocks
            const preBlocks = preview.querySelectorAll('pre');
            
            preBlocks.forEach((pre) => {
                // Wrap the <pre> in a relative container so the absolute button aligns correctly
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                // Insert wrapper before pre, then move pre inside wrapper
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                // Create the copy button
                const button = document.createElement('button');
                button.className = 'copy-button';
                button.innerText = 'Copy';

                // Handle the copy action
                button.addEventListener('click', () => {
                    const code = pre.querySelector('code')?.innerText || pre.innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = 'Copied!';
                        button.style.backgroundColor = '#2ea043'; // Green success color
                        button.style.color = '#fff';
                        
                        // Reset button text after 2 seconds
                        setTimeout(() => { 
                            button.innerText = 'Copy'; 
                            button.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
                            button.style.color = '#c9d1d9';
                        }, 2000);
                    });
                });

                // Add button to the wrapper
                wrapper.appendChild(button);
            });
        }

        // Listen for typing
        editor.addEventListener('input', updatePreview);

        // Default text showcasing the new features
        editor.value = `# My Custom Previewer

This now looks much closer to the Gemini interface! 

Here is some **Python** code to test the new copy button:

\`\`\`python
def greet_user(name):
    print(f"Hello, {name}!")
    return True

greet_user("Developer")
\`\`\`

And here is some standard inline code like \`npm install marked\` just to make sure it looks distinct.`;
        
        updatePreview();
    </script>
</body>
</html>
